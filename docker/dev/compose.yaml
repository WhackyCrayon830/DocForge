services:

  docforge-dev:

    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile

    container_name: docforge-dev

    working_dir: /app

    volumes:
      - ../../:/app

    ports:
      - "8501:8501"

    environment:
      PYTHONUNBUFFERED: 1

    command:
      [
        "streamlit",
        "run",
        "docforge/app/app.py",
        "--server.address=0.0.0.0",
        "--server.fileWatcherType=poll"
      ]